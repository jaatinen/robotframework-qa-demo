name: Robot Framework UI Tests

on:
  push:
    paths:
      - 'tests/ui/**'
  workflow_dispatch:

jobs:
  robot-ui-tests:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install Robot Framework and Selenium dependencies
      run: |
        python -m pip install --upgrade pip
        pip install robotframework selenium robotframework-seleniumlibrary

    - name: Install Google Chrome
      uses: browser-actions/setup-chrome@latest

    - name: Run Robot Framework UI tests
      run: |
        cd tests/ui
        robot .

    - name: Upload Robot Framework results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: robot-ui-test-results
        path: |
          tests/ui/output.xml
          tests/ui/log.html
          tests/ui/report.html

    - name: Lisää kommentti Jira-tikettiin (SCRUM-1)
      if: always()
      run: |
        curl -X POST \
          -u "${{ secrets.JIRA_EMAIL }}:${{ secrets.JIRA_API_TOKEN }}" \
          -H "Content-Type: application/json" \
          --data '{
            "body": "✅ Robot Framework UI testit on ajettu.\n\nTarkastele raporttia:\nhttps://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }' \
          https://${{ secrets.JIRA_DOMAIN }}/rest/api/3/issue/SCRUM-1/comment