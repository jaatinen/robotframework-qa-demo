name: Run Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Run API tests now
  api-tests:
    runs-on: ubuntu-latest
    name: Run API Tests
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run API Tests
        run: robot tests/api

  # Run React unit tests
  frontend-tests:
    runs-on: ubuntu-latest
    name: Run React unit tests
    defaults:
      run:
        working-directory: frontend-tests
    steps:
      - uses: actions/checkout@v3
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm install
      - name: Run frontend tests
        run: npm test -- --watchAll=false

  # Run Python unit tests
  python-tests:
    runs-on: ubuntu-latest
    name: Run Python Unit Tests
    defaults:
      run:
        working-directory: python-tests
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install pytest
        run: pip install pytest
      - name: Run tests
        run: pytest

  # Run JMeter Performance Tests
  jmeter-tests:
    runs-on: ubuntu-latest
    name: Run JMeter Performance Tests
    steps:
      - uses: actions/checkout@v3
      - name: Install JMeter
        run: sudo apt-get update && sudo apt-get install -y jmeter
      - name: Remove old JMeter results and HTML report
        run: |
          rm -rf tests/performance/html-report
          rm -f results.jtl
      - name: Run JMeter test
        run: jmeter -n -t tests/performance/reqres_api_test.jmx -l results.jtl -e -o tests/performance/html-report

  run-single-robot-test:
    runs-on: ubuntu-latest
    name: Run Single Robot Framework UI Test
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Chrome and ChromeDriver
        run: |
          sudo apt-get update
          sudo apt-get install -y wget
          wget https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo dpkg -i google-chrome-stable_current_amd64.deb || sudo apt-get install -f -y
          sudo apt-get install -y chromium-chromedriver
          # Ensure symbolic links are correct
          if [ ! -f /opt/google/chrome/google-chrome ]; then
            sudo ln -sf /usr/bin/google-chrome /opt/google/chrome/google-chrome
          fi
          if [ ! -f /usr/local/bin/chromedriver ]; then
            sudo ln -sf /usr/bin/chromedriver /usr/local/bin/chromedriver
          fi
          export PATH=$PATH:/opt/google/chrome:/usr/local/bin
          # Verify installation
          google-chrome --version
          chromedriver --version

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run a single Robot Framework UI Test
        env:
          ROBOT_BROWSER: chrome
        run: robot login_test2.robot      